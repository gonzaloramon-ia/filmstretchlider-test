name: Validar sitio

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validar JavaScript
        run: node --check script.js
      - name: Validar sitio
        run: node scripts/validate.mjs
